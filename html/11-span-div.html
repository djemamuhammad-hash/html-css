<!DOCTYPE html>
<html>
    <head>
        <title>span-div</title>
    </head>
    <body>
        <!-- <span> inline container to group elements for styling puposes -->
        <!-- <div> block container to group elements for styling purposes -->

        <h1><span style="background-color:aqua"> this is a span title</span></h1>
        <h1><div style="background-color:gold"> this is a div title</div></h1>
        <!-- we used css -->

        <p><span style="background-color:blue"> this is a span sentence </span></p>
        <p><div style="background-color:chartreuse"> this is a div sentence </div></p>



    </body>


</html>
