<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display</title>
    <link rel="stylesheet" href="css/8-display.css">
</head>

<body>
    <!-- display: property specefies if/how an element is displayed
     
                block-level: starts on a new line take up the full length 
                              (h1, p, div, form, header, footer)
                              
                inline-level: do not start on a new line , width is limited to what is needed
                                (span, a, img)
    -->

    <div>div</div>
    <span id="span1">span</span>
    <span id="span2">span</span>

</body>
</html>
