<!--a hyperlink is a digital reference to data that a user can follow by clicking a button(link)-->
<!DOCTYPE html>
<html>
    <head>
        <title>hyperlinks</title>
    </head>
    <body>

    <!--href: hypertext reference-->
    <!--target: opens in a new tab or a new window-->
    <!--title: display info about element as a tool tip-->
    <a href="https://www.google.com/"
    target="_blank"
    title="goes to google">    
    
    click me 
    </a>


    <br>

    <a href="lyrics.html"> <!--takes you to another html file -->
    song lyrics
    
    </a>

    <br>

    <a href="mailto:test@fake.com"> <!--link that begins the process of emailing someone-->
    
    email me
    </a>


    </body>
</html>
