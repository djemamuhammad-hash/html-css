<!DOCTYPE html>
<html>
    <head>
        <title>forms</title>
    </head>

    <body>

        <form action="index.php" method="post">  
        <!-- the action attribute sends data tothis location-->
        <!-- method attribute spesefies if this is a get request or a post request-->
        <!-- post is used with sensetive information (username, password...)-->
        <!--get is used with non-sensitive information-->

        <label for="username">username:</label>
        <input type="text" id="username" placeholder="spongebob" minlength="6" required>  <!-- the for and id are when u click the text it will mova the cursor to the textbox -->
        <!-- required you have to enter something else will not work-->
        <!--minlength are the least required char's to enter theres also maxlength-->
        <!--placeholder is a hint for what u should type -->
        
        <br>

        <label for="password">password:</label>
        <input type="password" id="password" required minlength="6" maxlength="15">
        <br>

        <label for="email">email:</label>
        <input type="email" id="email" required placeholder="ahfhvjce@gmail.com">
        <br>

        <label for="phone">phone number:</label>
        <input type="tel" id="phone" required placeholder="0000-00-00-00" pattern="[0-9]{4}[0-9]{2}[0-9]{2}[0-9]{2}">
        <br>

        <label for="date">birthdate:</label>
        <input type="date" id="date">
        <br>

        <label for="quantity">quantity:</label>
        <input type="number" id="quantity" min="0" max="100" value="1"> <!-- value is to set a default number -->
        <br>

        <label for="title">title:</label>

        <label for="mr.">Mr.</label>
        <input type="radio" id="mr." value="mr." name="title">
        <label for="Ms">Mr.</label>
        <input type="radio" id="Ms." value="Ms." name="title">
        <label for="Dr.">Mr.</label>
        <input type="radio" id="Dr." value="Dr." name="title">
        <br>

        <label for="payment">payment:</label>
        <select id="payment">
            <option value="visa">visa</option>
            <option value="mastercard">mastercard</option>
            <option value="giftcard">gifrtcard</option>
        </select>
        <br>

        <label for="subscribe">subscribe:</label>
        <input type="checkbox" id="subscribe" >
        <br>

        <label for="comment">comment:</label>
        <textarea id =comment rows="3" cols="25" ></textarea>
        <br>

        <label for="file">file:</label>
        <input type="file" id="file">

        <br><br>
        <input type="reset">  <!-- a reset button -->
        <input type="submit">  <!-- a submit button -->


        </form>

    </body>

</html>
